name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill references
        run: ./scripts/validate-skill.sh

      - name: Validate SKILL.md frontmatter
        run: bash scripts/validate-frontmatter.sh

      - name: Validate documentation links
        run: ./scripts/validate-docs.sh

      - name: Validate supported tool coverage
        run: ./scripts/validate-supported.sh

      - name: Validate npm pack contents
        run: bash scripts/validate-npm-pack.sh

      - name: Validate Cursor full install dry-run
        run: bash scripts/validate-cursor-install.sh

      - name: Validate research R0 scaffold
        run: bash scripts/validate-research-scaffold.sh

      - name: Validate reference sync
        run: bash scripts/validate-reference-sync.sh

      - name: Validate golden fixtures
        run: bash scripts/validate-golden.sh

      - name: Validate G1–G12 behavioral routing contracts
        run: bash scripts/validate-behavioral-golden.sh

      - name: Check version sync
        run: |
          ROOT_VERSION=$(tr -d '[:space:]' < VERSION)
          SKILL_VERSION=$(grep -E '^version:' arabic/SKILL.md | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$ROOT_VERSION" != "$SKILL_VERSION" ]; then
            echo "VERSION ($ROOT_VERSION) != SKILL.md ($SKILL_VERSION)"
            exit 1
          fi
          echo "Version OK: $ROOT_VERSION"

  website-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Run G15–G16 Playwright golden tests
        run: bash scripts/validate-website-playwright.sh
