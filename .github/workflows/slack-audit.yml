name: Slack Audit

# Run on pull requests that modify content or copy
on:
  pull_request:
    paths:
      - 'content/**'
      - 'src/**'
      - 'i18n/**'
  workflow_dispatch:

env:
  SLACK_CHANNEL: '#content-audit'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed content
        id: changes
        uses: tj-actions/changed-files@v41
        with:
          files: |
            content/**/*.md
            src/**/*.ts
            i18n/**/*.json

      - name: Extract Arabic content
        if: steps.changes.outputs.any_changed == 'true'
        id: extract
        env:
          ALL_CHANGED_FILES: ${{ steps.changes.outputs.all_changed_files }}
        run: |
          mkdir -p audit-results
          echo "Changed files:" > audit-results/summary.txt
          printf '%s\n' "$ALL_CHANGED_FILES" >> audit-results/summary.txt
          echo "" >> audit-results/summary.txt
          echo "Files to audit: $(printf '%s\n' "$ALL_CHANGED_FILES" | wc -l)" >> audit-results/summary.txt

      - name: Notify audit started
        if: steps.changes.outputs.any_changed == 'true'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🔍 Content audit started for PR #${{ github.event.pull_request.number }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*PR #${{ github.event.pull_request.number }}: Content Audit*\n\n*Author:* ${{ github.event.pull_request.user.login }}\n*Title:* ${{ github.event.pull_request.title }}\n\n⏳ Running audit checks...\n\n/arabic audit --dialect masri"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: audit-results
          path: audit-results/
          retention-days: 7

      - name: Comment on PR
        if: steps.changes.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔍 Arabic content audit initiated in Slack. Check #content-audit channel for results.'
            })
